name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write  # for OIDC Trusted Publishing to PyPI

jobs:
  test:
    name: Test before release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[yaml,jinja2,dev]"
      - run: pytest --tb=short -q

  publish:
    name: Build & publish to PyPI
    needs: test
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build

      - name: Build distribution
        run: python -m build

      - name: Publish to PyPI (Trusted Publishing)
        uses: pypa/gh-action-pypi-publish@release/v1

  github-release:
    name: Create GitHub Release
    needs: publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract changelog for this version
        id: changelog
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          python - <<'EOF'
          import re, sys
          tag = "${{ github.ref_name }}".lstrip("v")
          text = open("CHANGELOG.md").read()
          # Find the section for this version
          pattern = rf"## \[{re.escape(tag)}\][^\n]*\n(.*?)(?=\n## \[|\Z)"
          m = re.search(pattern, text, re.DOTALL)
          notes = m.group(1).strip() if m else "See CHANGELOG.md for details."
          with open("release_notes.md", "w") as f:
              f.write(notes)
          EOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release_notes.md
          generate_release_notes: true
