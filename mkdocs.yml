site_name: yaconfiglib
site_description: Another Config lib for python, basically load config/yaml/toml/... files and add some features like relative import and templating.
site_url: https://jose-pr.github.io/yaconfiglib/
repo_url: https://github.com/jose-pr/yaconfiglib
repo_name: jose-pr/yaconfiglib
edit_uri: edit/main/docs/
docs_dir: docs

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - content.code.copy

nav:
  - Home: index.md
  - API Reference: api/reference.md
  - Changelog: changelog.md

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            show_source: true
            show_root_heading: true
            merge_init_into_class: true
            show_if_no_docstring: true

markdown_extensions:
  - admonition
  - tables
  - pymdownx.snippets:
      base_path: ["."]
  - pymdownx.superfences
